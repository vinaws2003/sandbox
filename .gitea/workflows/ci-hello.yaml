name: ci-hello
on: [push]
jobs:
  hello:
    runs-on: nas
    steps:
      - run: |
          echo "✅ Gitea Actions runner OK"
          echo "runner host: $(hostname)"
          echo "repo: $GITHUB_REPOSITORY  ref: $GITHUB_REF  sha: $GITHUB_SHA"
          echo "alpine job container: $(cat /etc/alpine-release 2>/dev/null)"
